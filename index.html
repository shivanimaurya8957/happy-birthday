<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Sahil 🎉</title>
    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            overflow: auto;
        }

        #main {
            display: none;
            margin-top: 50px;
        }

        h1 {
            color: white;
            font-size: 40px;
        }

        p {
            font-size: 20px;
            color: white;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 200px;
        }

        img {
            width: 250px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .balloon {
            position: absolute;
            width: 50px;
            height: 70px;
            background: red;
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @keyframes float {
            0% { bottom: -100px; }
            100% { bottom: 100%; }
        }
    </style>
</head>

<body>

<button onclick="showSurprise()">🎁 Click for Surprise</button>

<div id="main">
    <h1>🎂 Happy Birthday Sahil 🎉</h1>

    <!-- Yaha apni photo link dalna -->
    <img src="sahil.jpg">

    <p>
       🎂 Happy Birthday Sahil 🎉<br><br>

Dear Bhai ❤️<br><br>

Meri dua hai ki tum hamesha khush raho,

tumhari life me success aur smile kabhi kam na ho ✨

Bas aise hi hamesha haste raho aur mujhe tang karte raho 😄<br><br> 

Once again Happy Birthday to you 🎂🎁

    </p>
</div>

<audio id="music" src="saavane-happy-birthday-254480.mp3"></audio>

<script>
function showSurprise() {
    document.querySelector("button").style.display = "none";
    document.getElementById("main").style.display = "block";

    document.getElementById("music").play();

    for (let i = 0; i < 20; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
        document.body.appendChild(b);
    }
}
</script>

</body>
</html>
